<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastros</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" type="text/css" href="index.css">
</head>
<body class="container mt-5">
    <div class="text-center mb-4">
        <button class="btn btn-primary" onclick="novo()">Novo Cadastro</button>
    </div>
    
    <div id="formulario" class="card p-4 mb-4" style="display: none;">
        <input type="hidden" id="txtid">
        
        <div class="mb-3">
            <label class="form-label">Nome:</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" class="form-control" id="txtnome"/>
            </div>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Telefone:</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                <input type="text" class="form-control" id="txttelefone"/>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">E-mail:</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" class="form-control" id="txtemail"/>
            </div>
        </div>
        
        <div class="mt-3 text-center">
            <button class="btn btn-primary me-2" onclick="salvar()">Salvar</button>
            <button class="btn btn-secondary" onclick="cancelar()">Cancelar</button>
        </div>
    </div>

    <div id="conteudo"></div>

    <script src="index.js"></script>
</body>
</html>
